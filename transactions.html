<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <script>
    (function () {
      var theme = localStorage.getItem("payru-theme") || "dark";
      document.documentElement.setAttribute("data-theme", theme);
    })();
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Transactions — PayRu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@600;700;800&display=swap" rel="stylesheet" />
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
  <link rel="stylesheet" href="css/datatable-theme.css" />
</head>
<body data-page="transactions" data-title="Transactions" data-subtitle="View and track all your crypto orders and Deriv funding activity.">

  <div class="app-layout">
    <div class="sidebar-backdrop" id="sidebarBackdrop"></div>
    <aside class="sidebar" id="sidebar"></aside>

    <main class="app-main">
      <header class="app-topbar" id="topbar"></header>

      <div class="page-content">
        <div class="kyc-banner" id="kycBanner" style="display:none;"></div>

        <div class="card">
          <div class="filter-bar">
            <input type="text" id="searchInput" class="form-control search-input" placeholder="Search by asset, CR number or ID..." />
            <select id="typeFilter" class="form-control">
              <option value="all">All Types</option>
              <option value="buy">Buy Crypto</option>
              <option value="sell">Sell Crypto</option>
              <option value="fund">Deriv Fund</option>
              <option value="withdraw">Deriv Withdraw</option>
            </select>
            <select id="statusFilter" class="form-control">
              <option value="all">All Statuses</option>
              <option value="pending_deposit">Awaiting Deposit</option>
              <option value="awaiting_confirmation">Confirming Deposit</option>
              <option value="completed">Completed</option>
              <option value="cancelled">Cancelled</option>
              <option value="pending">Deriv Pending</option>
              <option value="processing">Deriv Processing</option>
              <option value="funded">Deriv Funded</option>
              <option value="received">CR Received</option>
              <option value="paid">Wallet Credited</option>
              <option value="rejected">Rejected</option>
            </select>
          </div>

          <div class="table-wrap" id="txnTableWrap">
            <table class="data-table" id="txnTable">
              <thead>
                <tr>
                  <th>#</th>
                  <th>Date</th>
                  <th>Type</th>
                  <th>Details</th>
                  <th>Amount (USD)</th>
                  <th>Amount (NGN)</th>
                  <th>Status</th>
                  <th>Action</th>
                </tr>
              </thead>
              <tbody id="txnBody"></tbody>
            </table>
          </div>

          <div class="empty-state" id="txnEmpty" style="display:none;">
            <i class='bx bx-receipt'></i>
            <h4>No transactions found</h4>
            <p>Try adjusting your filters, or start a new buy or sell order.</p>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- ===== Transaction Detail Modal ===== -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-head">
        <h3>Transaction Details</h3>
        <button class="modal-close" id="modalClose"><i class='bx bx-x'></i></button>
      </div>
      <div class="detail-list" id="modalBody"></div>
      <div class="modal-actions">
        <a href="#" class="btn btn-primary" id="modalContinueBtn" style="display:none;"><i class='bx bx-right-arrow-alt'></i> Continue</a>
      </div>
    </div>
  </div>

  <script src="js/db.js"></script>
  <script src="js/main.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/theme.js"></script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
  <script src="js/datatable.js"></script>
  <script src="js/transactions.js"></script>
</body>
</html>
