<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deposits — PayruExchange Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@600;700;800&display=swap" rel="stylesheet" />
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/dashboard.css" />
  <link rel="stylesheet" href="../css/datatable-theme.css" />
</head>
<body data-page="deposits" data-title="Deposits" data-subtitle="Review incoming crypto deposits and NGN payments, and confirm them once received.">

  <div class="app-layout">
    <div class="sidebar-backdrop" id="sidebarBackdrop"></div>
    <aside class="sidebar" id="sidebar"></aside>

    <main class="app-main">
      <header class="app-topbar" id="topbar"></header>

      <div class="page-content">
        <div class="card">
          <div class="filter-bar">
            <input type="text" id="searchInput" class="form-control search-input" placeholder="Search by name, email or asset..." />
            <select id="statusFilter" class="form-control">
              <option value="active">Awaiting Action</option>
              <option value="awaiting_confirmation">Confirming Deposit</option>
              <option value="pending_deposit">Awaiting Deposit</option>
              <option value="awaiting_payment_confirmation">Confirming Payment</option>
              <option value="pending_payment">Awaiting Payment</option>
              <option value="all">All</option>
            </select>
          </div>

          <div class="table-wrap" id="depositsTableWrap">
            <table class="data-table" id="depositsTable">
              <thead>
                <tr>
                  <th>#</th>
                  <th>User</th>
                  <th>Type</th>
                  <th>Asset</th>
                  <th>Amount</th>
                  <th>Address / Reference</th>
                  <th>Status</th>
                  <th>Action</th>
                </tr>
              </thead>
              <tbody id="depositsBody"></tbody>
            </table>
          </div>

          <div class="empty-state" id="depositsEmpty" style="display:none;">
            <i class='bx bx-download'></i>
            <h4>No deposits found</h4>
            <p>There's nothing to show for this filter right now.</p>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="../js/db.js"></script>
  <script src="../js/main.js"></script>
  <script src="../js/admin.js"></script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
  <script src="../js/datatable.js"></script>
  <script src="../js/admin-deposits.js"></script>
</body>
</html>
